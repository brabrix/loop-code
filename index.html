<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carcará Code</title>
    <style>
      /* Pinta o canvas "carvão quente" já no primeiro paint — sem flash branco
         enquanto o bundle (CSS/JS) ainda nem carregou. */
      html, body { margin: 0; height: 100%; background: #191615; }

      /* Splash instantâneo: vive no HTML puro, aparece antes do React.
         O main.jsx remove (com fade) assim que a aplicação monta. */
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 22px; background: #191615;
        transition: opacity .35s ease;
        font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
      }
      #splash .mark { width: 60px; height: 56px; animation: carcara-pulse 1.7s ease-in-out infinite; }
      #splash .mark path { fill: #e6a35a; }
      #splash .word {
        font-size: 11px; font-weight: 700; letter-spacing: .28em; text-transform: uppercase;
        color: #8a7f73;
      }
      #splash .bar { width: 132px; height: 3px; border-radius: 9999px; overflow: hidden; background: #2a2521; }
      #splash .bar > i {
        display: block; height: 100%; width: 42%; border-radius: 9999px;
        background: linear-gradient(90deg, #b5611f, #f2792b, #b5611f);
        animation: carcara-load 1.25s ease-in-out infinite;
      }
      #splash .hint { min-height: 16px; font-size: 11.5px; color: #6f655b; opacity: 0; transition: opacity .4s ease; }

      @keyframes carcara-pulse {
        0%, 100% { opacity: .55; transform: scale(.97); }
        50%      { opacity: 1;   transform: scale(1); }
      }
      @keyframes carcara-load {
        0%   { transform: translateX(-130%); }
        100% { transform: translateX(320%); }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash .mark, #splash .bar > i { animation: none; }
        #splash .mark { opacity: .85; }
      }
    </style>
  </head>
  <body>
    <div id="splash" role="status" aria-label="Carregando Carcará Code">

      <div class="word">Carcará Code</div>
      <div class="bar"><i></i></div>
      <div class="hint" id="splash-hint"></div>
    </div>
    <div id="root"></div>
    <script>
      // Rede de segurança: se em ~18s o app não montou (splash ainda na tela),
      // mostra um aviso — assim você sabe que travou, não que "está só carregando".
      setTimeout(function () {
        var h = document.getElementById('splash-hint');
        if (h && document.getElementById('splash')) {
          h.textContent = 'Está demorando mais que o normal… (Ctrl+Shift+I abre o console)';
          h.style.opacity = '1';
        }
      }, 18000);
    </script>
    <script type="module" src="/src/main.jsx"></script>

</html>
